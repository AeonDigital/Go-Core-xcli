name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------
  # JOB 1: TEST SUITE & SECURITY ANALYSIS (Runs on Push and PRs)
  # ------------------------------------------------------------
  test:
    name: Run Tests & Security (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Load Project Environment Metadata
        shell: bash
        run: bash .github/scripts/ci-cd/01-load-metadata.sh

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run govulncheck
        if: matrix.os == 'ubuntu-latest'
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Run Tests in All Modules
        shell: pwsh
        run: .github/scripts/ci-cd/02-run-tests.ps1

      - name: Evaluate Gates & Render Dynamic Badge
        if: matrix.os == 'ubuntu-latest'
        uses: vladopajic/go-test-coverage@v2
        with:
          profile: .github/coverage.out
          local-prefix: ${{ env.MODULE_PREFIX }}
          threshold-total: ${{ env.COVERAGE_THRESHOLD }}
          git-token: ${{ secrets.GITHUB_TOKEN }}
          git-branch: badges

  # ------------------------------------------------------------
  # JOB 2: COMPILATION INTEGRITY CHECK (Pre-verification stage)
  # ------------------------------------------------------------
  build-check:
    name: Verify Code Compilation
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Load Project Environment Metadata
        shell: bash
        run: bash .github/scripts/ci-cd/01-load-metadata.sh

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Pre-Build Verification
        run: bash .github/scripts/ci-cd/03-pre-build-verify.sh

  # ------------------------------------------------------------
  # JOB 3: RELEASE & ARTIFACT GENERATION (Executes Safely Last)
  # ------------------------------------------------------------
  release:
    name: Auto Tag, Versioning & Build
    needs: build-check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Load Project Environment Metadata
        shell: bash
        run: bash .github/scripts/ci-cd/01-load-metadata.sh

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check for Official Entry Points from Text File
        id: check_executable
        run: bash .github/scripts/ci-cd/04-check-entrypoints.sh

      - name: Determine Next Version and Manage Tag
        id: versioning
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/ci-cd/05-manage-version-tag.sh

      - name: Run GoReleaser (Publish Cross-Platform Binaries)
        if: steps.check_executable.outputs.has_main == 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean -f .github/release/config.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
